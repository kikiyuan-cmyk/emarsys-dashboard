name: Daily Emarsys Data Update

on:
  schedule:
    # Every day at 10:00 UTC = 18:00 CST (UTC+8)
    - cron: '0 10 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright && playwright install chromium --with-deps

      - name: Run scraper
        env:
          EMARSYS_ACCOUNT: ${{ secrets.EMARSYS_ACCOUNT }}
          EMARSYS_USERNAME: ${{ secrets.EMARSYS_USERNAME }}
          EMARSYS_PASSWORD: ${{ secrets.EMARSYS_PASSWORD }}
        run: python scripts/scrape_all.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || (git commit -m "data: auto update $(date +%Y-%m-%d)" && git push)

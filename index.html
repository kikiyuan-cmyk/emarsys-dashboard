<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emarsys 数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #f5f7fa;
  --bg-secondary: #edf0f5;
  --bg-card: #ffffff;
  --bg-card-hover: #fafbfd;
  --border: #e2e6ed;
  --border-hover: #c9cfd9;
  --text-primary: #1a2332;
  --text-secondary: #4a5568;
  --text-muted: #8896a6;
  --accent-blue: #2563eb;
  --accent-cyan: #0891b2;
  --accent-emerald: #059669;
  --accent-amber: #d97706;
  --accent-rose: #dc2626;
  --accent-violet: #7c3aed;
  --accent-orange: #ea580c;
  --accent-pink: #db2777;
  --gradient-blue: linear-gradient(135deg, #2563eb, #0891b2);
  --gradient-emerald: linear-gradient(135deg, #059669, #0891b2);
  --gradient-amber: linear-gradient(135deg, #d97706, #ea580c);
  --gradient-rose: linear-gradient(135deg, #dc2626, #db2777);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

.app { position: relative; z-index: 1; }

/* Header */
.header {
  padding: 18px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: #ffffff;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo {
  width: 38px; height: 38px;
  background: var(--gradient-blue);
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 17px;
  color: #fff;
  box-shadow: 0 2px 8px rgba(37,99,235,0.25);
}

.header-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text-primary);
}

.header-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 1px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.date-range {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 7px 14px;
}

.date-range label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
}

.date-range input[type="date"] {
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  outline: none;
  cursor: pointer;
}

.date-range-sep {
  color: var(--text-muted);
  font-size: 13px;
}

.quick-filters {
  display: flex;
  gap: 3px;
}

.quick-filter {
  padding: 6px 13px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans SC', sans-serif;
}

.quick-filter:hover {
  border-color: var(--accent-blue);
  color: var(--accent-blue);
  background: #f0f5ff;
}

.quick-filter.active {
  background: var(--accent-blue);
  border-color: var(--accent-blue);
  color: #fff;
  box-shadow: 0 2px 8px rgba(37,99,235,0.2);
}

/* Main Layout */
.main {
  padding: 24px 40px 60px;
  max-width: 1600px;
  margin: 0 auto;
}

/* KPI Cards */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}

.kpi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 22px;
  position: relative;
  overflow: hidden;
  transition: all 0.25s ease;
  box-shadow: var(--shadow-sm);
}

.kpi-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.kpi-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 12px 12px 0 0;
}

.kpi-card.blue::before { background: var(--gradient-blue); }
.kpi-card.emerald::before { background: var(--gradient-emerald); }
.kpi-card.amber::before { background: var(--gradient-amber); }
.kpi-card.rose::before { background: var(--gradient-rose); }

.kpi-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: 8px;
}

.kpi-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.kpi-card.blue .kpi-value { color: var(--accent-blue); }
.kpi-card.emerald .kpi-value { color: var(--accent-emerald); }
.kpi-card.amber .kpi-value { color: var(--accent-amber); }
.kpi-card.rose .kpi-value { color: var(--accent-rose); }

.kpi-change {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 12px;
  font-weight: 600;
  margin-top: 6px;
  padding: 2px 7px;
  border-radius: 5px;
}

.kpi-change.up {
  color: var(--accent-emerald);
  background: #ecfdf5;
}

.kpi-change.down {
  color: var(--accent-rose);
  background: #fef2f2;
}

.kpi-change-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-left: 5px;
}

/* Charts Grid */
.charts-row {
  display: grid;
  gap: 14px;
  margin-bottom: 14px;
}

.charts-row.two { grid-template-columns: 1fr 1fr; }
.charts-row.three { grid-template-columns: 2fr 1fr; }
.charts-row.full { grid-template-columns: 1fr; }

.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px;
  transition: all 0.25s;
  box-shadow: var(--shadow-sm);
}

.chart-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--border-hover);
}

.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.chart-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}

.chart-badge {
  font-size: 11px;
  color: var(--accent-blue);
  background: #eff6ff;
  padding: 3px 9px;
  border-radius: 5px;
  font-weight: 500;
}

.chart-wrapper {
  position: relative;
  width: 100%;
}

.chart-wrapper.trend { height: 300px; }
.chart-wrapper.pie { height: 300px; }
.chart-wrapper.bar { height: 300px; }

/* Data Table */
.table-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px;
  overflow-x: auto;
  box-shadow: var(--shadow-sm);
}

.data-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
}

.data-table thead th {
  background: #f8fafc;
  color: var(--text-muted);
  font-weight: 600;
  font-size: 11px;
  padding: 10px 12px;
  text-align: right;
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
  position: sticky;
  top: 0;
}

.data-table thead th:first-child {
  text-align: left;
  border-radius: 6px 0 0 0;
}

.data-table thead th:last-child {
  border-radius: 0 6px 0 0;
}

.data-table tbody td {
  padding: 9px 12px;
  text-align: right;
  border-bottom: 1px solid #f1f3f7;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-secondary);
  transition: background 0.15s;
}

.data-table tbody td:first-child {
  text-align: left;
  color: var(--text-primary);
  font-weight: 500;
}

.data-table tbody tr:hover td {
  background: #f8fafc;
}

.data-table tbody tr:last-child td {
  border-bottom: none;
}

/* Footer */
.last-updated {
  text-align: center;
  padding: 18px;
  font-size: 12px;
  color: var(--text-muted);
}

.last-updated span {
  color: var(--accent-blue);
  font-weight: 600;
}

/* Loading */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 14px;
}

.loading-spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent-blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  font-size: 14px;
  color: var(--text-muted);
}

/* Fade in */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-in {
  animation: fadeUp 0.4s ease forwards;
  opacity: 0;
}

/* Tab navigation */
.tab-nav {
  display: flex;
  gap: 2px;
  background: var(--bg-secondary);
  border-radius: 9px;
  padding: 3px;
  margin-bottom: 20px;
  width: fit-content;
  border: 1px solid var(--border);
}

.tab-btn {
  padding: 7px 18px;
  border: none;
  border-radius: 7px;
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans SC', sans-serif;
}

.tab-btn:hover { color: var(--text-secondary); }

.tab-btn.active {
  background: #ffffff;
  color: var(--text-primary);
  box-shadow: var(--shadow-sm);
}

.tab-content { display: none; }
.tab-content.active { display: block; }

/* Download button */
.btn-download {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: 7px;
  border: 1px solid var(--accent-blue);
  background: #eff6ff;
  color: var(--accent-blue);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans SC', sans-serif;
}
.btn-download:hover {
  background: var(--accent-blue);
  color: #fff;
}
.btn-download svg { width: 14px; height: 14px; }

/* Inline select */
.inline-select {
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text-primary);
  font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
  outline: none;
}
.inline-select:focus { border-color: var(--accent-blue); }

/* Growth cards */
.growth-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}
.growth-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 22px;
  box-shadow: var(--shadow-sm);
  text-align: center;
}
.growth-card .g-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.growth-card .g-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  font-weight: 700;
}
.growth-card .g-value.positive { color: var(--accent-emerald); }
.growth-card .g-value.negative { color: var(--accent-rose); }
.growth-card .g-value.neutral { color: var(--accent-blue); }

/* Responsive */
@media (max-width: 1200px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .charts-row.two, .charts-row.three { grid-template-columns: 1fr; }
  .header { padding: 14px 20px; flex-wrap: wrap; gap: 10px; }
  .main { padding: 16px; }
}

@media (max-width: 768px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .header-right { flex-wrap: wrap; }
  .kpi-value { font-size: 20px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">E</div>
      <div>
        <div class="header-title">Emarsys 数据看板</div>
        <div class="header-subtitle">邮件营销数据分析平台</div>
      </div>
    </div>
    <div class="header-right">
      <div class="quick-filters">
        <button class="quick-filter" onclick="setRange(7)">近7天</button>
        <button class="quick-filter" onclick="setRange(14)">近14天</button>
        <button class="quick-filter active" onclick="setRange(30)">近30天</button>
        <button class="quick-filter" onclick="setRange(90)">近90天</button>
        <button class="quick-filter" onclick="setRange(0)">全部</button>
      </div>
      <div class="date-range">
        <label>从</label>
        <input type="date" id="dateFrom">
        <span class="date-range-sep">~</span>
        <label>至</label>
        <input type="date" id="dateTo">
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main" id="mainContent">
    <div class="loading" id="loadingState">
      <div class="loading-spinner"></div>
      <div class="loading-text">正在加载数据...</div>
    </div>
  </main>
</div>

<script>
// =========== State ===========
let allData = [];
let filteredData = [];
let charts = {};

// =========== Data Load ===========
async function loadData() {
  try {
    const resp = await fetch('data.json');
    allData = await resp.json();
    allData.sort((a, b) => a.date.localeCompare(b.date));
    initDateRange();
    filterData();
    render();
  } catch (e) {
    document.getElementById('loadingState').innerHTML =
      `<div style="color:var(--accent-rose);">加载 data.json 失败</div>
       <div style="color:var(--text-muted);font-size:13px;margin-top:8px;">${e.message}</div>`;
  }
}

// =========== Date Filtering ===========
function initDateRange() {
  const dates = allData.map(d => d.date);
  // Default: last 30 days
  const endDate = dates[dates.length - 1];
  const d30 = new Date(endDate);
  d30.setDate(d30.getDate() - 29);
  document.getElementById('dateFrom').value = d30.toISOString().split('T')[0];
  document.getElementById('dateTo').value = endDate;
  document.getElementById('dateFrom').addEventListener('change', () => { clearActiveFilter(); filterData(); render(); });
  document.getElementById('dateTo').addEventListener('change', () => { clearActiveFilter(); filterData(); render(); });
}

function setRange(days) {
  document.querySelectorAll('.quick-filter').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const dates = allData.map(d => d.date);
  const endDate = dates[dates.length - 1];
  if (days === 0) {
    document.getElementById('dateFrom').value = dates[0];
  } else {
    const d = new Date(endDate);
    d.setDate(d.getDate() - days + 1);
    document.getElementById('dateFrom').value = d.toISOString().split('T')[0];
  }
  document.getElementById('dateTo').value = endDate;
  filterData();
  render();
}

function clearActiveFilter() {
  document.querySelectorAll('.quick-filter').forEach(b => b.classList.remove('active'));
}

function filterData() {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  filteredData = allData.filter(d => d.date >= from && d.date <= to);
}

// =========== Formatting ===========
function fmt(n) {
  if (n == null) return 'N/A';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toLocaleString();
}

function fmtFull(n) {
  if (n == null) return '-';
  return n.toLocaleString();
}

function calcPeriodChange(data, key) {
  if (data.length < 2) return null;
  const cur = data[data.length - 1][key];
  const first = data[0][key];
  if (!cur || !first) return null;
  const diff = cur - first;
  const pct = ((diff / first) * 100).toFixed(2);
  return { diff, pct, up: diff >= 0 };
}

// =========== Render ===========
function render() {
  if (!filteredData.length) return;
  const latest = filteredData[filteredData.length - 1];

  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  const main = document.getElementById('mainContent');

  // Helper: find latest record that has a non-null value for a key
  function latestWith(key) {
    for (let i = filteredData.length - 1; i >= 0; i--) {
      if (filteredData[i][key] != null) return filteredData[i];
    }
    return null;
  }

  const emailRec = latestWith('available_by_email');
  const activeRec = latestWith('global_active');
  const leadsRec = latestWith('leads');
  const inactiveRec = latestWith('inactive_lead');

  const changeEmail = calcPeriodChange(filteredData, 'available_by_email');
  const changeActive = calcPeriodChange(filteredData, 'global_active');
  const changeLeads = calcPeriodChange(filteredData, 'leads');
  const changeInactive = calcPeriodChange(filteredData, 'inactive_lead');

  // Date tag: show if data date differs from latest date
  function dateTag(rec) {
    if (!rec || rec.date === latest.date) return '';
    return `<span style="font-size:11px;color:var(--text-muted);margin-left:6px;">(${rec.date.slice(5)})</span>`;
  }

  main.innerHTML = `
    <!-- KPI -->
    <div class="kpi-grid fade-in" style="animation-delay:0.05s">
      <div class="kpi-card blue">
        <div class="kpi-label">全球订阅人数 (Available by Email)</div>
        <div class="kpi-value">${fmt(emailRec ? emailRec.available_by_email : null)}${dateTag(emailRec)}</div>
        ${changeEmail ? `<span class="kpi-change ${changeEmail.up ? 'up' : 'down'}">${changeEmail.up ? '&#9650;' : '&#9660;'} ${changeEmail.pct}%</span><span class="kpi-change-label">区间变化</span>` : ''}
      </div>
      <div class="kpi-card emerald">
        <div class="kpi-label">全球活跃用户</div>
        <div class="kpi-value">${fmt(activeRec ? activeRec.global_active : null)}${dateTag(activeRec)}</div>
        ${changeActive ? `<span class="kpi-change ${changeActive.up ? 'up' : 'down'}">${changeActive.up ? '&#9650;' : '&#9660;'} ${changeActive.pct}%</span><span class="kpi-change-label">区间变化</span>` : ''}
      </div>
      <div class="kpi-card amber">
        <div class="kpi-label">全球潜在用户 (Leads)</div>
        <div class="kpi-value">${fmt(leadsRec ? leadsRec.leads : null)}${dateTag(leadsRec)}</div>
        ${changeLeads ? `<span class="kpi-change ${changeLeads.up ? 'up' : 'down'}">${changeLeads.up ? '&#9650;' : '&#9660;'} ${changeLeads.pct}%</span><span class="kpi-change-label">区间变化</span>` : ''}
      </div>
      <div class="kpi-card rose">
        <div class="kpi-label">全球沉默用户 (Inactive Lead)</div>
        <div class="kpi-value">${fmt(inactiveRec ? inactiveRec.inactive_lead : null)}${dateTag(inactiveRec)}</div>
        ${changeInactive ? `<span class="kpi-change ${changeInactive.up ? 'down' : 'up'}">${changeInactive.up ? '&#9650;' : '&#9660;'} ${changeInactive.pct}%</span><span class="kpi-change-label">区间变化</span>` : ''}
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-nav fade-in" style="animation-delay:0.1s">
      <button class="tab-btn active" onclick="switchTab('overview')">总览</button>
      <button class="tab-btn" onclick="switchTab('subscription')">订阅分析</button>
      <button class="tab-btn" onclick="switchTab('active')">活跃用户</button>
      <button class="tab-btn" onclick="switchTab('growth')">增长分析</button>
      <button class="tab-btn" onclick="switchTab('table')">数据明细</button>
    </div>

    <!-- 总览 Tab -->
    <div class="tab-content active" id="tab-overview">
      <div class="charts-row three fade-in" style="animation-delay:0.15s">
        <div class="chart-card">
          <div class="chart-header">
            <div class="chart-title">全球订阅人数趋势</div>
            <div class="chart-badge">趋势图</div>
          </div>
          <div class="chart-wrapper trend"><canvas id="chartGlobalTrend"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-header">
            <div class="chart-title">用户构成</div>
            <div class="chart-badge">最新数据</div>
          </div>
          <div class="chart-wrapper pie"><canvas id="chartUserComposition"></canvas></div>
        </div>
      </div>
      <div class="charts-row two fade-in" style="animation-delay:0.2s">
        <div class="chart-card">
          <div class="chart-header">
            <div class="chart-title">各区域订阅人数</div>
            <div class="chart-badge">柱状对比</div>
          </div>
          <div class="chart-wrapper bar"><canvas id="chartRegionalBar"></canvas></div>
        </div>

// =========== Tab Switch ===========
function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tabId).classList.add('active');
}

// =========== Chart Defaults (Light theme) ===========
const chartDefaults = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: {
    legend: {
      labels: {
        color: '#4a5568',
        font: { family: 'Noto Sans SC', size: 11, weight: '500' },
        boxWidth: 12,
        boxHeight: 12,
        borderRadius: 3,
        useBorderRadius: true,
        padding: 14
      }
    },
    tooltip: {
      backgroundColor: '#ffffff',
      titleColor: '#1a2332',
      bodyColor: '#4a5568',
      borderColor: '#e2e6ed',
      borderWidth: 1,
      padding: 12,
      titleFont: { family: 'Noto Sans SC', size: 13, weight: '600' },
      bodyFont: { family: 'JetBrains Mono', size: 12 },
      cornerRadius: 8,
      displayColors: true,
      boxShadow: '0 4px 12px rgba(0,0,0,0.1)',
      callbacks: {
        label: ctx => {
          const v = ctx.parsed.y ?? ctx.parsed;
          return ` ${ctx.dataset.label || ctx.label}: ${typeof v === 'number' ? v.toLocaleString() : v}`;
        }
      }
    }
  },
  scales: {
    x: {
      grid: { color: '#f1f3f7', drawBorder: false },
      ticks: { color: '#8896a6', font: { family: 'JetBrains Mono', size: 10 }, maxRotation: 45 },
      border: { display: false }
    },
    y: {
      grid: { color: '#f1f3f7', drawBorder: false },
      ticks: {
        color: '#8896a6',
        font: { family: 'JetBrains Mono', size: 10 },
        callback: v => {
          if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
          if (v >= 1e3) return (v / 1e3).toFixed(0) + 'K';
          return v;
        }
      },
      border: { display: false }
    }
  }
};

function lineDataset(label, data, color, fill = false) {
  return {
    label,
    data,
    borderColor: color,
    backgroundColor: fill ? color + '15' : color,
    borderWidth: 2.5,
    pointRadius: filteredData.length > 40 ? 0 : filteredData.length > 20 ? 1.5 : 3,
    pointHoverRadius: 5,
    pointBackgroundColor: color,
    pointBorderColor: '#ffffff',
    pointBorderWidth: 2,
    tension: 0.35,
    fill,
    spanGaps: true
  };
}

function buildOverviewCharts() {

  // Global Trend
  const ctx1 = document.getElementById('chartGlobalTrend');
  if (ctx1) {
    const datasets = [
      lineDataset('全球订阅人数', filteredData.map(d => d.available_by_email), '#2563eb', true)
    ];
    // Only add active/inactive if data exists
    if (filteredData.some(d => d.global_active != null)) {
      datasets.push(lineDataset('全球活跃用户', filteredData.map(d => d.global_active), '#059669'));
    }
    if (filteredData.some(d => d.inactive_lead != null)) {
      datasets.push(lineDataset('沉默用户', filteredData.map(d => d.inactive_lead), '#dc2626'));

function buildActiveCharts() {
  const fData = filteredData.filter(d => d.apac_active != null);
  if (!fData.length) return;
  const labels = fData.map(d => d.date.slice(5));
  const latest = fData[fData.length - 1];

  // Active Trend
  const ctx1 = document.getElementById('chartActiveTrend');
  if (ctx1) {
    charts.activeTrend = new Chart(ctx1, {
      type: 'line',
      data: {
        labels,
        datasets: [
          lineDataset('亚太活跃', fData.map(d => d.apac_active), '#059669'),
          lineDataset('北美活跃', fData.map(d => d.na_active), '#0891b2'),
          lineDataset('欧洲活跃', fData.map(d => d.eu_active), '#db2777'),
          lineDataset('北美(除美)活跃', fData.map(d => d.na_ex_us_active), '#d97706'),
          lineDataset('全球活跃', fData.map(d => d.global_active), '#7c3aed')
        ]
      },
      options: { ...chartDefaults, interaction: { mode: 'index', intersect: false } }
    });
  }

  // Active/Subscription Ratio — 4 doughnut charts per region
  const regionsCfg = [
    { id: 'chartRatioAPAC', label: '亚太', active: latest.apac_active, sub: latest.apac_sub, color: '#059669' },
    { id: 'chartRatioNA', label: '北美', active: latest.na_active, sub: latest.na_sub, color: '#0891b2' },
    { id: 'chartRatioEU', label: '欧洲', active: latest.eu_active, sub: latest.eu_sub, color: '#db2777' },
    { id: 'chartRatioNAex', label: '北美(除美国)', active: latest.na_ex_us_active, sub: latest.na_ex_us_sub, color: '#d97706' }
  ];
  for (const r of regionsCfg) {
    const el = document.getElementById(r.id);
    if (el && r.active != null && r.sub != null) {
      const inactive = r.sub - r.active;
      const pct = ((r.active / r.sub) * 100).toFixed(1);
      charts['ratio_' + r.id] = new Chart(el, {
        type: 'doughnut',
        data: {
          labels: ['活跃用户', '非活跃订阅'],
          datasets: [{
            data: [r.active, inactive],
            backgroundColor: [r.color, '#e2e6ed'],
            borderColor: '#ffffff',
            borderWidth: 2,
            hoverOffset: 4
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '65%',
          plugins: {
            legend: { display: false },
            tooltip: chartDefaults.plugins.tooltip,
            // Center label plugin (via title)
          }
        },
        plugins: [{
          id: 'centerText',
          afterDraw(chart) {
            const { ctx, width, height } = chart;
            ctx.save();
            ctx.font = '600 13px Noto Sans SC';
            ctx.fillStyle = '#1a2332';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText(r.label, width / 2, height / 2 - 2);
            ctx.font = '700 18px JetBrains Mono';
            ctx.fillStyle = r.color;
            ctx.textBaseline = 'top';
            ctx.fillText(pct + '%', width / 2, height / 2 + 2);
            ctx.restore();
          }
        }]
      });
    }
  }

  // Active Pie
  const ctx2 = document.getElementById('chartActivePie');
  if (ctx2) {
    charts.activePie = new Chart(ctx2, {
      type: 'doughnut',
      data: {
        labels: ['亚太', '北美', '欧洲', '北美(除美国)'],
        datasets: [{
          data: [latest.apac_active, latest.na_active, latest.eu_active, latest.na_ex_us_active],
          backgroundColor: ['#059669', '#0891b2', '#db2777', '#d97706'],
          borderColor: '#ffffff', borderWidth: 3, hoverOffset: 6
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '58%',
        plugins: {
          legend: { position: 'bottom', labels: { color: '#4a5568', font: { family: 'Noto Sans SC', size: 11 }, padding: 14, boxWidth: 12, boxHeight: 12, borderRadius: 3, useBorderRadius: true } },
          tooltip: chartDefaults.plugins.tooltip
        }
      }
    });
  }

  // Active vs Inactive
  const ctx3 = document.getElementById('chartActiveInactiveBar');
  if (ctx3) {
    const recent = fData.slice(-7);
    charts.activeInactiveBar = new Chart(ctx3, {
      type: 'bar',
      data: {
        labels: recent.map(d => d.date.slice(5)),
        datasets: [
          { label: '全球活跃', data: recent.map(d => d.global_active), backgroundColor: '#05966960', borderColor: '#059669', borderWidth: 1.5, borderRadius: 4, borderSkipped: false, stack: 'stack0' },

        ]
      },
      options: {
        ...chartDefaults,
        plugins: { ...chartDefaults.plugins, legend: { ...chartDefaults.plugins.legend, position: 'top' } },
        scales: { ...chartDefaults.scales, y: { ...chartDefaults.scales.y, beginAtZero: false } }
      }
    });
  }

  // Active Rate (%)
  const ctxRate = document.getElementById('chartActiveRate');
  if (ctxRate) {
    const regions = ['亚太', '北美', '欧洲', '北美(除美国)'];
    const rates = [
      latest.apac_sub ? ((latest.apac_active / latest.apac_sub) * 100).toFixed(1) : 0,
      latest.na_sub ? ((latest.na_active / latest.na_sub) * 100).toFixed(1) : 0,
      latest.eu_sub ? ((latest.eu_active / latest.eu_sub) * 100).toFixed(1) : 0,
      latest.na_ex_us_sub ? ((latest.na_ex_us_active / latest.na_ex_us_sub) * 100).toFixed(1) : 0
    ];
    charts.activeRate = new Chart(ctxRate, {
      type: 'bar',
      data: {
        labels: regions,
        datasets: [{
          label: '活跃率 %',
          data: rates,
          backgroundColor: ['#05966970', '#0891b270', '#db277770', '#d9770670'],
          borderColor: ['#059669', '#0891b2', '#db2777', '#d97706'],
          borderWidth: 1.5, borderRadius: 6, borderSkipped: false
        }]
      },
      options: {
        ...chartDefaults,
        plugins: { ...chartDefaults.plugins, legend: { display: false } },
        scales: {
          ...chartDefaults.scales,
          y: { ...chartDefaults.scales.y, beginAtZero: true, max: 100, ticks: { ...chartDefaults.scales.y.ticks, callback: v => v + '%' } }
        }
      }
    });
  }
}

// =========== Growth Charts ===========
function buildGrowthCharts() {
  const gData = filteredData.filter(d => d.available_by_email != null);
  if (gData.length < 2) return;

  // Calculate daily deltas
  const dailyDeltas = [];
  for (let i = 1; i < gData.length; i++) {
    const prev = gData[i - 1];
    const cur = gData[i];
    const newSub = (cur.available_by_email || 0) - (prev.available_by_email || 0);
    const churn = (cur.unavailable_by_email || 0) - (prev.unavailable_by_email || 0);
    const net = newSub - (churn > 0 ? churn : 0);
    dailyDeltas.push({
      date: cur.date,
      newSub: newSub > 0 ? newSub : 0,
      churn: churn > 0 ? churn : 0,
      net: net
    });
  }

  // Update KPI cards
  const totalNewSub = dailyDeltas.reduce((s, d) => s + d.newSub, 0);
  const totalChurn = dailyDeltas.reduce((s, d) => s + d.churn, 0);
  const totalNet = totalNewSub - totalChurn;

  const gvNew = document.getElementById('gvNewSub');
  const gvChurn = document.getElementById('gvChurn');
  const gvNet = document.getElementById('gvNet');
  if (gvNew) gvNew.textContent = '+' + totalNewSub.toLocaleString();
  if (gvChurn) gvChurn.textContent = '-' + totalChurn.toLocaleString();
  if (gvNet) {
    gvNet.textContent = (totalNet >= 0 ? '+' : '') + totalNet.toLocaleString();
    gvNet.className = 'g-value ' + (totalNet >= 0 ? 'positive' : 'negative');
  }

  const labels = dailyDeltas.map(d => d.date.slice(5));

  // Growth Trend (bar + line)
  const ctx1 = document.getElementById('chartGrowthTrend');
  if (ctx1) {
    charts.growthTrend = new Chart(ctx1, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: '每日新增', data: dailyDeltas.map(d => d.newSub), backgroundColor: '#05966960', borderColor: '#059669', borderWidth: 1, borderRadius: 3, borderSkipped: false, order: 2 },
          { label: '每日流失', data: dailyDeltas.map(d => -d.churn), backgroundColor: '#dc262640', borderColor: '#dc2626', borderWidth: 1, borderRadius: 3, borderSkipped: false, order: 2 },
          { label: '净增', data: dailyDeltas.map(d => d.net), type: 'line', borderColor: '#2563eb', backgroundColor: '#2563eb', borderWidth: 2.5, pointRadius: gData.length > 40 ? 0 : 2, pointHoverRadius: 4, tension: 0.3, order: 1 }
        ]
      },
      options: {
        ...chartDefaults,
        interaction: { mode: 'index', intersect: false },
        plugins: { ...chartDefaults.plugins, legend: { ...chartDefaults.plugins.legend, position: 'top' } }
      }
    });
  }

  // Cumulative
  const ctx2 = document.getElementById('chartGrowthCumulative');
  if (ctx2) {
    let cumNew = 0, cumChurn = 0;
    const cumNewArr = [], cumChurnArr = [];
    for (const d of dailyDeltas) {
      cumNew += d.newSub;
      cumChurn += d.churn;
      cumNewArr.push(cumNew);
      cumChurnArr.push(cumChurn);
    }
    charts.growthCumulative = new Chart(ctx2, {
      type: 'line',
      data: {
        labels,
        datasets: [
          lineDataset('累计新增订阅', cumNewArr, '#059669', true),
          lineDataset('累计流失', cumChurnArr, '#dc2626', true)
        ]
      },
      options: { ...chartDefaults, interaction: { mode: 'index', intersect: false } }
    });
  }

  // Churn Breakdown
  const ctx3 = document.getElementById('chartChurnBreakdown');
  if (ctx3) {
    const recent = gData.slice(-7);
    charts.churnBreakdown = new Chart(ctx3, {
      type: 'bar',
      data: {
        labels: recent.map(d => d.date.slice(5)),
        datasets: [
          { label: 'No opt-in', data: recent.map(d => d.no_opt_in || 0), backgroundColor: '#7c3aed60', borderColor: '#7c3aed', borderWidth: 1.5, borderRadius: 3, borderSkipped: false, stack: 's1' },
          { label: 'Invalid email', data: recent.map(d => d.invalid_email || 0), backgroundColor: '#dc262640', borderColor: '#dc2626', borderWidth: 1.5, borderRadius: 3, borderSkipped: false, stack: 's1' },
          { label: 'Missing email', data: recent.map(d => d.missing_email || 0), backgroundColor: '#d9770640', borderColor: '#d97706', borderWidth: 1.5, borderRadius: 3, borderSkipped: false, stack: 's1' }
        ]
      },
      options: {
        ...chartDefaults,
        plugins: { ...chartDefaults.plugins, legend: { ...chartDefaults.plugins.legend, position: 'top' } },
        scales: { ...chartDefaults.scales, x: { ...chartDefaults.scales.x, stacked: true }, y: { ...chartDefaults.scales.y, stacked: true, beginAtZero: true } }
      }
    });
  }
}

// =========== CSV Download ===========
function downloadCSV() {
  const headers = ['日期','全球订阅','流失人数','退订人数','亚太订阅','北美订阅','欧洲订阅','北美(除美)订阅','潜在用户','沉默用户','亚太活跃','北美活跃','欧洲活跃','北美(除美)活跃','全球活跃'];
  const keys = ['date','available_by_email','unavailable_by_email','no_opt_in','apac_sub','na_sub','eu_sub','na_ex_us_sub','leads','inactive_lead','apac_active','na_active','eu_active','na_ex_us_active','global_active'];

  let csv = '\uFEFF' + headers.join(',') + '\n';
  for (const d of filteredData) {
    csv += keys.map(k => d[k] != null ? d[k] : '').join(',') + '\n';
  }

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `emarsys_data_${filteredData[0]?.date || 'export'}_to_${filteredData[filteredData.length-1]?.date || ''}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
